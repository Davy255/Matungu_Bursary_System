  <text x="1055" y="500" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">W9-W11</text>
  <text x="1175" y="500" font-family="Arial" font-size="20" fill="#0f172a">Core user features</text>
  <text x="1475" y="500" font-family="Arial" font-size="20" fill="#0f172a">Dev Team</text>

