  <text x="1055" y="405" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">W6-W8</text>
  <text x="1175" y="405" font-family="Arial" font-size="20" fill="#0f172a">Design pack + ERD</text>
