  <text x="1475" y="215" font-family="Arial" font-size="20" fill="#0f172a">Project Manager</text>

  <text x="55" y="310" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Phase 2</text>
  <text x="250" y="310" font-family="Arial" font-size="20" fill="#0f172a">Requirements gathering and validation</text>
  <text x="855" y="310" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">3 weeks</text>
