  <text x="250" y="595" font-family="Arial" font-size="20" fill="#0f172a">Development Sprint 2 (application workflow)</text>
  <text x="855" y="595" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">4 weeks</text>
  <text x="1055" y="595" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">W12-W15</text>
  <text x="1175" y="595" font-family="Arial" font-size="20" fill="#0f172a">Complete process flow</text>
  <text x="1475" y="595" font-family="Arial" font-size="20" fill="#0f172a">Dev Team</text>

  <text x="55" y="690" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Phase 6</text>
  <text x="250" y="690" font-family="Arial" font-size="20" fill="#0f172a">Unit, integration, UAT and fixes</text>
  <text x="855" y="690" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">2 weeks</text>
  <text x="1055" y="690" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">W16-W17</text>
  <text x="1175" y="690" font-family="Arial" font-size="20" fill="#0f172a">Test report + bug closure</text>
  <text x="1475" y="690" font-family="Arial" font-size="20" fill="#0f172a">QA / Users</text>

  <text x="55" y="785" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Phase 7</text>
  <text x="250" y="785" font-family="Arial" font-size="20" fill="#0f172a">Deployment and data migration</text>
  <text x="855" y="785" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">1 week</text>
  <text x="1055" y="785" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">W18</text>
  <text x="1175" y="785" font-family="Arial" font-size="20" fill="#0f172a">Production release</text>
  <text x="1475" y="785" font-family="Arial" font-size="20" fill="#0f172a">DevOps / PM</text>

  <text x="55" y="880" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Phase 8</text>
  <text x="250" y="880" font-family="Arial" font-size="20" fill="#0f172a">Training, handover, acceptance sign-off</text>
  <text x="855" y="880" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">2 weeks</text>
  <text x="1055" y="880" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">W19-W20</text>
  <text x="1175" y="880" font-family="Arial" font-size="20" fill="#0f172a">Go-live acceptance</text>
  <text x="1475" y="880" font-family="Arial" font-size="20" fill="#0f172a">PM / Sponsor</text>
