  <line x1="1140" y1="260" x2="970" y2="330" stroke="#334155" stroke-width="2"/>
  <line x1="1140" y1="300" x2="970" y2="460" stroke="#334155" stroke-width="2"/>

  <line x1="1140" y1="560" x2="970" y2="590" stroke="#334155" stroke-width="2"/>
  <line x1="1140" y1="600" x2="990" y2="710" stroke="#334155" stroke-width="2"/>
</svg>
