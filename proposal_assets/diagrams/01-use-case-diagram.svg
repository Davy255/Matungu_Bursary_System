<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="50" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="#0f172a">Use Case Diagram - Bursary Management System</text>

  <rect x="250" y="110" width="900" height="700" rx="16" fill="#ffffff" stroke="#0ea5e9" stroke-width="3"/>
  <text x="700" y="145" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#0f172a">System Boundary</text>

  <!-- Actors -->
  <circle cx="90" cy="260" r="20" fill="none" stroke="#111827" stroke-width="3"/>
  <line x1="90" y1="280" x2="90" y2="340" stroke="#111827" stroke-width="3"/>
  <line x1="60" y1="305" x2="120" y2="305" stroke="#111827" stroke-width="3"/>
  <line x1="90" y1="340" x2="65" y2="385" stroke="#111827" stroke-width="3"/>
  <line x1="90" y1="340" x2="115" y2="385" stroke="#111827" stroke-width="3"/>
  <text x="90" y="415" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Student</text>

  <circle cx="1310" cy="260" r="20" fill="none" stroke="#111827" stroke-width="3"/>
  <line x1="1310" y1="280" x2="1310" y2="340" stroke="#111827" stroke-width="3"/>
  <line x1="1280" y1="305" x2="1340" y2="305" stroke="#111827" stroke-width="3"/>
  <line x1="1310" y1="340" x2="1285" y2="385" stroke="#111827" stroke-width="3"/>
  <line x1="1310" y1="340" x2="1335" y2="385" stroke="#111827" stroke-width="3"/>
  <text x="1310" y="415" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Reviewer</text>

  <circle cx="1310" cy="560" r="20" fill="none" stroke="#111827" stroke-width="3"/>
  <line x1="1310" y1="580" x2="1310" y2="640" stroke="#111827" stroke-width="3"/>
  <line x1="1280" y1="605" x2="1340" y2="605" stroke="#111827" stroke-width="3"/>
  <line x1="1310" y1="640" x2="1285" y2="685" stroke="#111827" stroke-width="3"/>
  <line x1="1310" y1="640" x2="1335" y2="685" stroke="#111827" stroke-width="3"/>
  <text x="1310" y="715" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Admin</text>

  <!-- Use cases -->
  <ellipse cx="450" cy="230" rx="165" ry="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="450" y="238" text-anchor="middle" font-family="Arial" font-size="18" fill="#0f172a">Register / Login</text>

  <ellipse cx="450" cy="330" rx="165" ry="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="450" y="338" text-anchor="middle" font-family="Arial" font-size="18" fill="#0f172a">Manage Profile</text>

  <ellipse cx="450" cy="430" rx="180" ry="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="450" y="438" text-anchor="middle" font-family="Arial" font-size="18" fill="#0f172a">Submit Application</text>

  <ellipse cx="450" cy="530" rx="180" ry="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="450" y="538" text-anchor="middle" font-family="Arial" font-size="18" fill="#0f172a">Track Application Status</text>

  <ellipse cx="800" cy="330" rx="170" ry="42" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  <text x="800" y="338" text-anchor="middle" font-family="Arial" font-size="18" fill="#0f172a">Review Application</text>

  <ellipse cx="800" cy="460" rx="170" ry="42" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  <text x="800" y="468" text-anchor="middle" font-family="Arial" font-size="18" fill="#0f172a">Recommend Decision</text>

  <ellipse cx="800" cy="590" rx="170" ry="42" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="800" y="598" text-anchor="middle" font-family="Arial" font-size="18" fill="#0f172a">Approve / Reject</text>

  <ellipse cx="800" cy="710" rx="190" ry="42" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="800" y="718" text-anchor="middle" font-family="Arial" font-size="18" fill="#0f172a">Manage Schools & Reports</text>

  <!-- Connectors -->
  <line x1="120" y1="260" x2="285" y2="230" stroke="#334155" stroke-width="2"/>
