<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="950" viewBox="0 0 1500 950">
  <rect width="1500" height="950" fill="#f8fafc"/>
  <text x="750" y="50" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="#0f172a">Entity Relationship Diagram (Simplified)</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f172a"/>
    </marker>
  </defs>

  <!-- User -->
  <rect x="80" y="130" width="260" height="190" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="210" y="160" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">User</text>
  <text x="100" y="195" font-family="Arial" font-size="15" fill="#0f172a">PK: id</text>
  <text x="100" y="220" font-family="Arial" font-size="15" fill="#0f172a">username</text>
  <text x="100" y="245" font-family="Arial" font-size="15" fill="#0f172a">email (unique)</text>
  <text x="100" y="270" font-family="Arial" font-size="15" fill="#0f172a">role</text>
  <text x="100" y="295" font-family="Arial" font-size="15" fill="#0f172a">is_verified</text>

  <!-- UserProfile -->
  <rect x="430" y="130" width="280" height="240" rx="10" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  <text x="570" y="160" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">UserProfile</text>
  <text x="450" y="195" font-family="Arial" font-size="15" fill="#0f172a">PK: id</text>
  <text x="450" y="220" font-family="Arial" font-size="15" fill="#0f172a">FK: user_id (1:1 User)</text>
  <text x="450" y="245" font-family="Arial" font-size="15" fill="#0f172a">id_number</text>
  <text x="450" y="270" font-family="Arial" font-size="15" fill="#0f172a">date_of_birth</text>
  <text x="450" y="295" font-family="Arial" font-size="15" fill="#0f172a">guardian_name, phone</text>
  <text x="450" y="320" font-family="Arial" font-size="15" fill="#0f172a">FK: ward_id</text>
  <text x="450" y="345" font-family="Arial" font-size="15" fill="#0f172a">profile_photo</text>

  <!-- Application -->
  <rect x="820" y="130" width="300" height="250" rx="10" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="970" y="160" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Application</text>
  <text x="840" y="195" font-family="Arial" font-size="15" fill="#0f172a">PK: id</text>
  <text x="840" y="220" font-family="Arial" font-size="15" fill="#0f172a">FK: user_id (User)</text>
  <text x="840" y="245" font-family="Arial" font-size="15" fill="#0f172a">FK: school_id (School)</text>
  <text x="840" y="270" font-family="Arial" font-size="15" fill="#0f172a">FK: program_id (Program)</text>
  <text x="840" y="295" font-family="Arial" font-size="15" fill="#0f172a">status</text>
  <text x="840" y="320" font-family="Arial" font-size="15" fill="#0f172a">requested_amount</text>
  <text x="840" y="345" font-family="Arial" font-size="15" fill="#0f172a">submitted_at</text>

  <!-- School -->
  <rect x="1200" y="130" width="240" height="180" rx="10" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
  <text x="1320" y="160" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">School</text>
  <text x="1220" y="195" font-family="Arial" font-size="15" fill="#0f172a">PK: id</text>
  <text x="1220" y="220" font-family="Arial" font-size="15" fill="#0f172a">name</text>
  <text x="1220" y="245" font-family="Arial" font-size="15" fill="#0f172a">school_type</text>
  <text x="1220" y="270" font-family="Arial" font-size="15" fill="#0f172a">county</text>

  <!-- Program -->
  <rect x="1200" y="350" width="240" height="170" rx="10" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
  <text x="1320" y="380" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Program</text>
  <text x="1220" y="415" font-family="Arial" font-size="15" fill="#0f172a">PK: id</text>
  <text x="1220" y="440" font-family="Arial" font-size="15" fill="#0f172a">FK: school_id</text>
  <text x="1220" y="465" font-family="Arial" font-size="15" fill="#0f172a">name</text>
  <text x="1220" y="490" font-family="Arial" font-size="15" fill="#0f172a">level</text>

  <!-- Ward -->
  <rect x="80" y="470" width="260" height="150" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="210" y="500" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Ward</text>
  <text x="100" y="535" font-family="Arial" font-size="15" fill="#0f172a">PK: id</text>
  <text x="100" y="560" font-family="Arial" font-size="15" fill="#0f172a">name</text>
  <text x="100" y="585" font-family="Arial" font-size="15" fill="#0f172a">constituency</text>

  <!-- Review -->
  <rect x="500" y="500" width="280" height="180" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
  <text x="640" y="530" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">ApplicationReview</text>
  <text x="520" y="565" font-family="Arial" font-size="15" fill="#0f172a">PK: id</text>
  <text x="520" y="590" font-family="Arial" font-size="15" fill="#0f172a">FK: application_id</text>
  <text x="520" y="615" font-family="Arial" font-size="15" fill="#0f172a">FK: reviewer_id (User)</text>
  <text x="520" y="640" font-family="Arial" font-size="15" fill="#0f172a">score, recommendation</text>

  <!-- Approval -->
  <rect x="860" y="500" width="290" height="190" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="1005" y="530" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">ApplicationApproval</text>
  <text x="880" y="565" font-family="Arial" font-size="15" fill="#0f172a">PK: id</text>
  <text x="880" y="590" font-family="Arial" font-size="15" fill="#0f172a">FK: application_id</text>
  <text x="880" y="615" font-family="Arial" font-size="15" fill="#0f172a">FK: approver_id (User)</text>
  <text x="880" y="640" font-family="Arial" font-size="15" fill="#0f172a">approved_amount</text>
  <text x="880" y="665" font-family="Arial" font-size="15" fill="#0f172a">decision, decision_date</text>

  <!-- Relationships -->
  <line x1="340" y1="210" x2="430" y2="210" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="385" y="200" text-anchor="middle" font-family="Arial" font-size="13" fill="#0f172a">1:1</text>

  <line x1="710" y1="250" x2="820" y2="250" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="765" y="238" text-anchor="middle" font-family="Arial" font-size="13" fill="#0f172a">1:M</text>

  <line x1="1120" y1="215" x2="1200" y2="215" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1160" y="202" text-anchor="middle" font-family="Arial" font-size="13" fill="#0f172a">M:1</text>

  <line x1="1120" y1="275" x2="1200" y2="420" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1162" y="340" text-anchor="middle" font-family="Arial" font-size="13" fill="#0f172a">M:1</text>

  <line x1="210" y1="470" x2="510" y2="350" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="360" y="405" text-anchor="middle" font-family="Arial" font-size="13" fill="#0f172a">1:M</text>

  <line x1="970" y1="380" x2="640" y2="500" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="805" y="430" text-anchor="middle" font-family="Arial" font-size="13" fill="#0f172a">1:M</text>

  <line x1="980" y1="380" x2="1005" y2="500" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1010" y="445" text-anchor="middle" font-family="Arial" font-size="13" fill="#0f172a">1:M</text>

  <line x1="250" y1="320" x2="560" y2="500" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="320" x2="930" y2="500" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
