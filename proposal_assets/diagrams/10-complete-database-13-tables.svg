  <line x1="370" y1="525" x2="690" y2="525" stroke="#16a34a" stroke-width="2"/>
  <text x="390" y="550" font-size="13" fill="#111">id (PK)</text>
  <text x="390" y="575" font-size="13" fill="#111">applicant_id (FK→users_user)</text>
  <text x="390" y="600" font-size="13" fill="#111">application_number, status</text>
  <text x="390" y="625" font-size="13" fill="#111">amount_requested/approved</text>

  <!-- applications_applicationdocument -->
  <rect x="730" y="480" width="300" height="180" fill="#dcfce7" stroke="#16a34a" stroke-width="3" rx="8"/>
  <text x="880" y="510" font-size="16" font-weight="bold" text-anchor="middle" fill="#16a34a">applications_applicationdocument</text>
  <line x1="730" y1="525" x2="1030" y2="525" stroke="#16a34a" stroke-width="2"/>
  <text x="750" y="550" font-size="13" fill="#111">id (PK)</text>
  <text x="750" y="575" font-size="13" fill="#111">application_id (FK)</text>
  <text x="750" y="600" font-size="13" fill="#111">document_type, file</text>
  <text x="750" y="625" font-size="13" fill="#111">file_size, uploaded_at</text>

  <!-- applications_applicationreview -->
  <rect x="1070" y="480" width="300" height="180" fill="#dcfce7" stroke="#16a34a" stroke-width="3" rx="8"/>
  <text x="1220" y="510" font-size="16" font-weight="bold" text-anchor="middle" fill="#16a34a">applications_applicationreview</text>
