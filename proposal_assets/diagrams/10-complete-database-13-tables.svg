<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 2000">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="2400" height="2000" fill="#ffffff"/>

  <!-- Title -->
  <text x="1200" y="50" font-size="32" font-weight="bold" text-anchor="middle" fill="#1f2937">
    BURSARY SYSTEM - DATABASE STRUCTURE (13 TABLES)
  </text>
  <text x="1200" y="85" font-size="18" text-anchor="middle" fill="#666">
    Complete Table Inventory with Relationships
  </text>

  <!-- ==================== USERS DOMAIN (TEAL) ==================== -->
  <text x="150" y="140" font-size="18" font-weight="bold" fill="#0d9488">USERS DOMAIN</text>

  <!-- users_user -->
  <rect x="50" y="160" width="350" height="200" fill="#d1faf0" stroke="#0d9488" stroke-width="3" rx="8"/>
