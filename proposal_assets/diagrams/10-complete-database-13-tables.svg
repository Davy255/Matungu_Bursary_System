  <text x="870" y="280" font-size="13" fill="#111">role_type (super_admin,</text>
  <text x="870" y="305" font-size="13" fill="#111">reviewer, finance)</text>
  <text x="870" y="330" font-size="13" fill="#111">permissions, department</text>

  <!-- users_passwordreset -->
  <rect x="1250" y="160" width="350" height="200" fill="#d1faf0" stroke="#0d9488" stroke-width="3" rx="8"/>
