  <text x="880" y="945" font-size="13" fill="#111">duration_years, is_active</text>

  <!-- ==================== NOTIFICATIONS DOMAIN (PINK) ==================== -->
  <text x="150" y="1100" font-size="18" font-weight="bold" fill="#ec4899">NOTIFICATIONS DOMAIN</text>

  <!-- notifications_notification -->
  <rect x="50" y="1120" width="450" height="160" fill="#fce7f3" stroke="#ec4899" stroke-width="3" rx="8"/>
  <text x="275" y="1150" font-size="16" font-weight="bold" text-anchor="middle" fill="#ec4899">notifications_notification</text>
  <line x1="50" y1="1165" x2="500" y2="1165" stroke="#ec4899" stroke-width="2"/>
  <text x="70" y="1190" font-size="13" fill="#111">id (PK)</text>
  <text x="70" y="1215" font-size="13" fill="#111">user_id (FK→users_user) | notification_type | title, message, link | is_read, created_at</text>

  <!-- ==================== RELATIONSHIP ARROWS ==================== -->
  <!-- Primary Key/Foreign Key Legend -->
  <text x="150" y="1350" font-size="16" font-weight="bold" fill="#333">KEY RELATIONSHIPS WITH ARROWS:</text>

  <!-- users_userprofile → users_user -->
  <path d="M 625 160 L 625 120 L 225 120 L 225 160" stroke="#0d9488" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="400" y="135" font-size="12" fill="#0d9488" font-weight="bold">1:1 Relationship</text>

  <!-- users_adminrole → users_user -->
  <path d="M 1025 160 L 1025 100 L 225 100 L 225 160" stroke="#0d9488" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="600" y="105" font-size="12" fill="#0d9488" font-weight="bold">1:1 Relationship</text>

  <!-- users_passwordreset → users_user -->
  <path d="M 1425 160 L 1425 80 L 225 80 L 225 160" stroke="#0d9488" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="800" y="85" font-size="12" fill="#0d9488" font-weight="bold">N:1 Relationship</text>

  <!-- applications_application → users_user (applicant) -->
  <path d="M 530 480 L 530 380" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="540" y="430" font-size="12" fill="#16a34a" font-weight="bold">applicant_id FK</text>

  <!-- applications_application → applications_ward -->
  <path d="M 420 480 L 260 660" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="280" y="570" font-size="12" fill="#16a34a" font-weight="bold">ward_id FK</text>

  <!-- applications_applicationdocument → applications_application -->
  <path d="M 730 580 L 690 580" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="700" y="565" font-size="12" fill="#16a34a" font-weight="bold">application_id FK</text>

  <!-- applications_applicationreview → applications_application -->
  <path d="M 1070 520 L 690 520" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="880" y="505" font-size="12" fill="#16a34a" font-weight="bold">application_id FK</text>

  <!-- applications_applicationreview → users_user (reviewer) -->
  <path d="M 1220 480 L 1220 360" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1230" y="420" font-size="12" fill="#16a34a" font-weight="bold">reviewer_id FK</text>

  <!-- applications_applicationapproval → applications_application -->
  <path d="M 1410 540 L 730 540" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1070" y="525" font-size="12" fill="#16a34a" font-weight="bold">application_id FK</text>

  <!-- applications_applicationapproval → users_user (approver) -->
  <path d="M 1570 480 L 1570 340" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1580" y="410" font-size="12" fill="#16a34a" font-weight="bold">approver_id FK</text>

  <!-- schools_campus → schools_school -->
  <path d="M 470 870 L 430 870" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="440" y="855" font-size="12" fill="#7c3aed" font-weight="bold">school_id FK</text>

  <!-- schools_program → schools_school -->
  <path d="M 860 900 L 430 900" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="640" y="885" font-size="12" fill="#7c3aed" font-weight="bold">school_id FK</text>

  <!-- applications_application → schools fields -->
  <path d="M 550 660 L 550 800" stroke="#d946ef" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="560" y="730" font-size="11" fill="#d946ef" font-weight="bold">school_id, campus_id FK</text>

  <!-- notifications_notification → users_user -->
  <path d="M 275 1120 L 275 360" stroke="#ec4899" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="285" y="740" font-size="12" fill="#ec4899" font-weight="bold">user_id FK</text>

  <!-- ==================== SUMMARY TABLE ==================== -->
  <rect x="50" y="1380" width="1700" height="120" fill="#f0f4f8" stroke="#334155" stroke-width="2" rx="8"/>
  <text x="70" y="1410" font-size="14" font-weight="bold" fill="#1f2937">SUMMARY: 13 TABLES TOTAL</text>
  <text x="70" y="1435" font-size="13" fill="#334155">USERS: 4 tables (users_user, users_userprofile, users_adminrole, users_passwordreset)</text>
  <text x="70" y="1460" font-size="13" fill="#334155">APPLICATIONS: 5 tables (applications_ward, applications_application, applications_applicationdocument, applications_applicationreview, applications_applicationapproval)</text>
  <text x="70" y="1485" font-size="13" fill="#334155">SCHOOLS: 3 tables (schools_school, schools_campus, schools_program) | NOTIFICATIONS: 1 table (notifications_notification)</text>

  <!-- ==================== NOTES ==================== -->
  <rect x="50" y="1540" width="1700" height="100" fill="#fff7ed" stroke="#ea580c" stroke-width="2" rx="8"/>
  <text x="70" y="1570" font-size="14" font-weight="bold" fill="#7c2d12">RELATIONSHIP TYPES:</text>
  <text x="70" y="1595" font-size="12" fill="#7c2d12">1:1 (One-to-One): users_user↔users_userprofile, users_user↔users_adminrole, applications_application↔applications_applicationapproval</text>
  <text x="70" y="1620" font-size="12" fill="#7c2d12">N:1 (Many-to-One): All FK relationships | All tables have: id (PK), created_at, updated_at fields | Status tracking: draft→submitted→under_review→approved→rejected→disbursed</text>
</svg>