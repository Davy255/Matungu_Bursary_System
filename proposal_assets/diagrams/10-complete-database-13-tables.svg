  <text x="240" y="830" font-size="16" font-weight="bold" text-anchor="middle" fill="#7c3aed">schools_school</text>
  <line x1="50" y1="845" x2="430" y2="845" stroke="#7c3aed" stroke-width="2"/>
  <text x="70" y="870" font-size="13" fill="#111">id (PK)</text>
  <text x="70" y="895" font-size="13" fill="#111">name, school_type (university,</text>
  <text x="70" y="920" font-size="13" fill="#111">college, tvet, polytechnic)</text>
  <text x="70" y="945" font-size="13" fill="#111">registration_number, email, phone</text>

  <!-- schools_campus -->
  <rect x="470" y="800" width="350" height="180" fill="#ede9fe" stroke="#7c3aed" stroke-width="3" rx="8"/>
