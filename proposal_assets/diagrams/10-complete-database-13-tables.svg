  <line x1="50" y1="205" x2="400" y2="205" stroke="#0d9488" stroke-width="2"/>
  <text x="70" y="230" font-size="13" fill="#111">id (PK)</text>
  <text x="70" y="255" font-size="13" fill="#111">username (unique)</text>
  <text x="70" y="280" font-size="13" fill="#111">email (unique)</text>
  <text x="70" y="305" font-size="13" fill="#111">phone_number, role</text>
  <text x="70" y="330" font-size="13" fill="#111">is_verified, created_at</text>

