  <text x="1090" y="575" font-size="13" fill="#111">application_id (FK)</text>
  <text x="1090" y="600" font-size="13" fill="#111">reviewer_id (FK→users_user)</text>
  <text x="1090" y="625" font-size="13" fill="#111">score, comments, reviewed_at</text>

  <!-- applications_applicationapproval -->
  <rect x="1410" y="480" width="320" height="180" fill="#dcfce7" stroke="#16a34a" stroke-width="3" rx="8"/>
