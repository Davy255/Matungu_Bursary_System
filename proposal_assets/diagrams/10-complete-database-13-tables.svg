  <text x="1430" y="575" font-size="13" fill="#111">application_id (FK)</text>
  <text x="1430" y="600" font-size="13" fill="#111">approver_id (FK→users_user)</text>
  <text x="1430" y="625" font-size="13" fill="#111">approved_amount, approved_at</text>

  <!-- ==================== SCHOOLS DOMAIN (PURPLE) ==================== -->
