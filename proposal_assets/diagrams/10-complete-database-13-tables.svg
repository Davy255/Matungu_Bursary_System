  <text x="490" y="895" font-size="13" fill="#111">school_id (FK→schools_school)</text>
  <text x="490" y="920" font-size="13" fill="#111">name, location</text>
  <text x="490" y="945" font-size="13" fill="#111">is_main (boolean)</text>

  <!-- schools_program -->
  <rect x="860" y="800" width="350" height="180" fill="#ede9fe" stroke="#7c3aed" stroke-width="3" rx="8"/>
  <text x="1035" y="830" font-size="16" font-weight="bold" text-anchor="middle" fill="#7c3aed">schools_program</text>
  <line x1="860" y1="845" x2="1210" y2="845" stroke="#7c3aed" stroke-width="2"/>
