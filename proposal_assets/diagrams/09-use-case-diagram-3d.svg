<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: bold; fill: #1f2937; }
      .actor-label { font-size: 14px; font-weight: bold; fill: #1f2937; text-anchor: middle; }
      .usecase-label { font-size: 12px; text-anchor: middle; fill: #1f2937; font-weight: 500; }
      .boundary-label { font-size: 16px; fill: #64748b; font-style: italic; font-weight: bold; }
      .relationship-line { stroke: #475569; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#f8fafc"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" class="title">Use Case Diagram - Bursary Management System</text>

  <!-- System Boundary -->
  <rect x="250" y="120" width="900" height="700" fill="none" stroke="#1e40af" stroke-width="3" rx="10"/>
  <text x="270" y="145" class="boundary-label">Bursary System</text>

  <!-- ===== ACTORS - STICK FIGURES ===== -->

  <!-- STUDENT (Top Left) -->
  <g id="actor-student">
    <!-- Head (circle) -->
    <circle cx="80" cy="180" r="15" fill="none" stroke="#2563eb" stroke-width="2"/>
    <!-- Body (line) -->
    <line x1="80" y1="195" x2="80" y2="240" class="relationship-line" stroke="#2563eb"/>
    <!-- Left Arm -->
    <line x1="80" y1="210" x2="50" y2="190" class="relationship-line" stroke="#2563eb"/>
    <!-- Right Arm -->
    <line x1="80" y1="210" x2="110" y2="190" class="relationship-line" stroke="#2563eb"/>
    <!-- Left Leg -->
    <line x1="80" y1="240" x2="60" y2="280" class="relationship-line" stroke="#2563eb"/>
    <!-- Right Leg -->
    <line x1="80" y1="240" x2="100" y2="280" class="relationship-line" stroke="#2563eb"/>
    <!-- Label -->
    <text x="80" y="310" class="actor-label" fill="#2563eb">Student</text>
  </g>

  <!-- REVIEWER (Bottom Left) -->
  <g id="actor-reviewer">
    <!-- Head -->
    <circle cx="80" cy="500" r="15" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <!-- Body -->
    <line x1="80" y1="515" x2="80" y2="560" class="relationship-line" stroke="#7c3aed"/>
    <!-- Left Arm -->
    <line x1="80" y1="530" x2="50" y2="510" class="relationship-line" stroke="#7c3aed"/>
    <!-- Right Arm -->
    <line x1="80" y1="530" x2="110" y2="510" class="relationship-line" stroke="#7c3aed"/>
    <!-- Left Leg -->
    <line x1="80" y1="560" x2="60" y2="600" class="relationship-line" stroke="#7c3aed"/>
    <!-- Right Leg -->
    <line x1="80" y1="560" x2="100" y2="600" class="relationship-line" stroke="#7c3aed"/>
    <!-- Label -->
    <text x="80" y="630" class="actor-label" fill="#7c3aed">Reviewer</text>
  </g>

  <!-- ADMIN (Right Side) -->
  <g id="actor-admin">
    <!-- Head -->
    <circle cx="1280" cy="300" r="15" fill="none" stroke="#dc2626" stroke-width="2"/>
    <!-- Body -->
    <line x1="1280" y1="315" x2="1280" y2="360" class="relationship-line" stroke="#dc2626"/>
    <!-- Left Arm -->
    <line x1="1280" y1="330" x2="1250" y2="310" class="relationship-line" stroke="#dc2626"/>
    <!-- Right Arm -->
    <line x1="1280" y1="330" x2="1310" y2="310" class="relationship-line" stroke="#dc2626"/>
    <!-- Left Leg -->
    <line x1="1280" y1="360" x2="1260" y2="400" class="relationship-line" stroke="#dc2626"/>
    <!-- Right Leg -->
    <line x1="1280" y1="360" x2="1300" y2="400" class="relationship-line" stroke="#dc2626"/>
    <!-- Label -->
    <text x="1280" y="430" class="actor-label" fill="#dc2626">Admin</text>
  </g>

  <!-- SUPER ADMIN (Right Side) -->
  <g id="actor-superadmin">
    <!-- Head -->
    <circle cx="1280" cy="630" r="15" fill="none" stroke="#ea580c" stroke-width="2"/>
    <!-- Body -->
    <line x1="1280" y1="645" x2="1280" y2="690" class="relationship-line" stroke="#ea580c"/>
    <!-- Left Arm -->
    <line x1="1280" y1="660" x2="1250" y2="640" class="relationship-line" stroke="#ea580c"/>
    <!-- Right Arm -->
    <line x1="1280" y1="660" x2="1310" y2="640" class="relationship-line" stroke="#ea580c"/>
    <!-- Left Leg -->
    <line x1="1280" y1="690" x2="1260" y2="730" class="relationship-line" stroke="#ea580c"/>
    <!-- Right Leg -->
    <line x1="1280" y1="690" x2="1300" y2="730" class="relationship-line" stroke="#ea580c"/>
    <!-- Label -->
    <text x="1280" y="760" class="actor-label" fill="#ea580c">Super Admin</text>
  </g>

  <!-- USE CASES - OVALS ===== -->

  <!-- ROW 1: Authentication -->
  <!-- Register -->
  <ellipse cx="420" cy="180" rx="70" ry="40" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="420" y="185" class="usecase-label">Register</text>

  <!-- Login -->
  <ellipse cx="600" cy="180" rx="70" ry="40" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="600" y="185" class="usecase-label">Login</text>

  <!-- Reset Password -->
  <ellipse cx="780" cy="180" rx="70" ry="40" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="780" y="180" class="usecase-label">Reset</text>
  <text x="780" y="195" class="usecase-label">Password</text>

  <!-- ROW 2: Application Management -->
  <!-- Submit Application -->
  <ellipse cx="420" cy="310" rx="70" ry="40" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="420" y="305" class="usecase-label">Submit</text>
  <text x="420" y="320" class="usecase-label">Application</text>

  <!-- Upload Documents -->
  <ellipse cx="600" cy="310" rx="70" ry="40" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="600" y="305" class="usecase-label">Upload</text>
  <text x="600" y="320" class="usecase-label">Documents</text>

  <!-- Track Status -->
  <ellipse cx="780" cy="310" rx="70" ry="40" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="780" y="315" class="usecase-label">Track Status</text>

  <!-- ROW 3: Review & Approval -->
  <!-- Review Applications -->
  <ellipse cx="420" cy="450" rx="70" ry="40" fill="#fdf2f8" stroke="#be185d" stroke-width="2"/>
  <text x="420" y="445" class="usecase-label">Review</text>
  <text x="420" y="460" class="usecase-label">Applications</text>

  <!-- Approve/Reject -->
  <ellipse cx="600" cy="450" rx="70" ry="40" fill="#fdf2f8" stroke="#be185d" stroke-width="2"/>
  <text x="600" y="445" class="usecase-label">Approve/</text>
  <text x="600" y="460" class="usecase-label">Reject App</text>

  <!-- Send Notifications -->
  <ellipse cx="780" cy="450" rx="70" ry="40" fill="#fdf2f8" stroke="#be185d" stroke-width="2"/>
  <text x="780" y="455" class="usecase-label">Send Notifs</text>

  <!-- ROW 4: Admin Functions -->
  <!-- Manage Users -->
  <ellipse cx="420" cy="580" rx="70" ry="40" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="420" y="585" class="usecase-label">Manage Users</text>

  <!-- Manage Schools -->
  <ellipse cx="600" cy="580" rx="70" ry="40" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="600" y="585" class="usecase-label">Manage Schools</text>

  <!-- Generate Reports -->
  <ellipse cx="780" cy="580" rx="70" ry="40" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="780" y="585" class="usecase-label">Generate Reports</text>

  <!-- ROW 5: Super Admin -->
  <!-- System Configuration -->
  <ellipse cx="510" cy="710" rx="70" ry="35" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="510" y="705" class="usecase-label">System</text>
  <text x="510" y="720" class="usecase-label">Configuration</text>

  <!-- Audit Logs -->
  <ellipse cx="690" cy="710" rx="70" ry="35" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="690" y="715" class="usecase-label">View Audit Logs</text>

  <!-- ===== ASSOCIATIONS ===== -->

  <!-- Student associations -->
  <line x1="135" y1="200" x2="350" y2="180" class="relationship-line"/>
  <line x1="135" y1="220" x2="350" y2="300" class="relationship-line"/>
  <line x1="135" y1="240" x2="350" y2="320" class="relationship-line"/>
  <line x1="135" y1="260" x2="350" y2="340" class="relationship-line"/>

  <!-- Reviewer associations -->
  <line x1="135" y1="520" x2="350" y2="460" class="relationship-line"/>
  <line x1="135" y1="535" x2="350" y2="445" class="relationship-line"/>
  <line x1="140" y1="550" x2="530" y2="480" class="relationship-line"/>

  <!-- Admin associations -->
  <line x1="1210" y1="320" x2="850" y2="580" class="relationship-line"/>
  <line x1="1210" y1="330" x2="670" y2="590" class="relationship-line"/>
  <line x1="1210" y1="350" x2="490" y2="600" class="relationship-line"/>
  <line x1="1210" y1="360" x2="360" y2="595" class="relationship-line"/>

  <!-- Super Admin associations -->
  <line x1="1210" y1="650" x2="760" y2="730" class="relationship-line"/>
  <line x1="1210" y1="670" x2="580" y2="730" class="relationship-line"/>

  <!-- Legend -->
  <g id="legend">
    <rect x="280" y="820" width="800" height="70" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="6"/>
    
    <!-- Stick figure legend -->
    <circle cx="310" cy="840" r="8" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="310" y1="848" x2="310" y2="860" class="relationship-line" stroke="#333"/>
    <line x1="310" y1="852" x2="296" y2="842" class="relationship-line" stroke="#333"/>
    <line x1="310" y1="852" x2="324" y2="842" class="relationship-line" stroke="#333"/>
    <line x1="310" y1="860" x2="302" y2="875" class="relationship-line" stroke="#333"/>
    <line x1="310" y1="860" x2="318" y2="875" class="relationship-line" stroke="#333"/>
    <text x="350" y="857" font-size="12" fill="#333" font-weight="bold">Stick Figures = Actors (External Users)</text>

    <!-- Oval legend -->
    <ellipse cx="750" cy="840" rx="25" ry="15" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="790" y="857" font-size="12" fill="#333" font-weight="bold">Ovals = Use Cases (System Actions)</text>
  </g>

</svg>