<svg viewBox="0 0 1500 950" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 32px; font-weight: bold; fill: #000; }
      .actor-label { font-size: 16px; font-weight: bold; fill: #000; text-anchor: middle; }
      .usecase-label { font-size: 14px; text-anchor: middle; fill: #000; font-weight: bold; }
      .boundary-label { font-size: 18px; fill: #000; font-style: italic; font-weight: bold; }
      .relationship-line { stroke: #333; stroke-width: 2.5; fill: none; }
      .arrow-label { font-size: 13px; fill: #000; font-weight: bold; }
    </style>
    <!-- Arrow marker - solid triangle -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- White background for Word compatibility -->
  <rect width="1500" height="950" fill="#ffffff"/>

  <!-- Title -->
  <text x="750" y="55" text-anchor="middle" class="title">Use Case Diagram - Bursary Management System</text>

  <!-- System Boundary -->
  <rect x="270" y="140" width="950" height="700" fill="none" stroke="#000" stroke-width="3" rx="12"/>
  <text x="290" y="165" class="boundary-label">Bursary System Boundary</text>

  <!-- ========== ACTORS - STICK FIGURES ========== -->

  <!-- STUDENT (Top Left) -->
  <g id="actor-student">
    <circle cx="100" cy="200" r="16" fill="none" stroke="#000" stroke-width="2.5"/>
    <line x1="100" y1="216" x2="100" y2="260" stroke="#000" stroke-width="2.5"/>
    <line x1="100" y1="230" x2="70" y2="205" stroke="#000" stroke-width="2.5"/>
    <line x1="100" y1="230" x2="130" y2="205" stroke="#000" stroke-width="2.5"/>
    <line x1="100" y1="260" x2="78" y2="300" stroke="#000" stroke-width="2.5"/>
    <line x1="100" y1="260" x2="122" y2="300" stroke="#000" stroke-width="2.5"/>
    <text x="100" y="335" class="actor-label">Student</text>
  </g>

  <!-- REVIEWER (Bottom Left) -->
  <g id="actor-reviewer">
    <circle cx="100" cy="520" r="16" fill="none" stroke="#000" stroke-width="2.5"/>
    <line x1="100" y1="536" x2="100" y2="580" stroke="#000" stroke-width="2.5"/>
    <line x1="100" y1="550" x2="70" y2="525" stroke="#000" stroke-width="2.5"/>
    <line x1="100" y1="550" x2="130" y2="525" stroke="#000" stroke-width="2.5"/>
    <line x1="100" y1="580" x2="78" y2="620" stroke="#000" stroke-width="2.5"/>
    <line x1="100" y1="580" x2="122" y2="620" stroke="#000" stroke-width="2.5"/>
    <text x="100" y="655" class="actor-label">Reviewer</text>
  </g>

  <!-- ADMIN (Right Side) -->
  <g id="actor-admin">
    <circle cx="1350" cy="280" r="16" fill="none" stroke="#000" stroke-width="2.5"/>
    <line x1="1350" y1="296" x2="1350" y2="340" stroke="#000" stroke-width="2.5"/>
    <line x1="1350" y1="310" x2="1320" y2="285" stroke="#000" stroke-width="2.5"/>
    <line x1="1350" y1="310" x2="1380" y2="285" stroke="#000" stroke-width="2.5"/>
    <line x1="1350" y1="340" x2="1328" y2="380" stroke="#000" stroke-width="2.5"/>
    <line x1="1350" y1="340" x2="1372" y2="380" stroke="#000" stroke-width="2.5"/>
    <text x="1350" y="415" class="actor-label">Admin</text>
  </g>

  <!-- SUPER ADMIN (Right Side Bottom) -->
  <g id="actor-superadmin">
    <circle cx="1350" cy="650" r="16" fill="none" stroke="#000" stroke-width="2.5"/>
    <line x1="1350" y1="666" x2="1350" y2="710" stroke="#000" stroke-width="2.5"/>
    <line x1="1350" y1="680" x2="1320" y2="655" stroke="#000" stroke-width="2.5"/>
    <line x1="1350" y1="680" x2="1380" y2="655" stroke="#000" stroke-width="2.5"/>
    <line x1="1350" y1="710" x2="1328" y2="750" stroke="#000" stroke-width="2.5"/>
    <line x1="1350" y1="710" x2="1372" y2="750" stroke="#000" stroke-width="2.5"/>
    <text x="1350" y="785" class="actor-label">Super Admin</text>
  </g>

  <!-- ========== USE CASES - OVALS ========== -->

  <!-- ROW 1: Authentication Use Cases -->
  <ellipse cx="420" cy="190" rx="75" ry="45" fill="#e8f5e9" stroke="#000" stroke-width="2.5"/>
  <text x="420" y="189" class="usecase-label">Register</text>
  <text x="420" y="207" class="usecase-label">User</text>

  <ellipse cx="620" cy="190" rx="75" ry="45" fill="#e8f5e9" stroke="#000" stroke-width="2.5"/>
  <text x="620" y="189" class="usecase-label">Login</text>

  <ellipse cx="820" cy="190" rx="75" ry="45" fill="#e8f5e9" stroke="#000" stroke-width="2.5"/>
  <text x="820" y="180" class="usecase-label">Reset</text>
  <text x="820" y="198" class="usecase-label">Password</text>

  <!-- ROW 2: Application Management -->
  <ellipse cx="420" cy="330" rx="75" ry="45" fill="#e3f2fd" stroke="#000" stroke-width="2.5"/>
  <text x="420" y="320" class="usecase-label">Submit</text>
  <text x="420" y="338" class="usecase-label">Application</text>

  <ellipse cx="620" cy="330" rx="75" ry="45" fill="#e3f2fd" stroke="#000" stroke-width="2.5"/>
  <text x="620" y="320" class="usecase-label">Upload</text>
  <text x="620" y="338" class="usecase-label">Documents</text>

  <ellipse cx="820" cy="330" rx="75" ry="45" fill="#e3f2fd" stroke="#000" stroke-width="2.5"/>
  <text x="820" y="325" class="usecase-label">Track</text>
  <text x="820" y="343" class="usecase-label">Application</text>

  <!-- ROW 3: Review & Approval -->
  <ellipse cx="420" cy="480" rx="75" ry="45" fill="#fce4ec" stroke="#000" stroke-width="2.5"/>
  <text x="420" y="470" class="usecase-label">Review</text>
  <text x="420" y="488" class="usecase-label">Applications</text>

  <ellipse cx="620" cy="480" rx="75" ry="45" fill="#fce4ec" stroke="#000" stroke-width="2.5"/>
  <text x="620" y="470" class="usecase-label">Approve/</text>
  <text x="620" y="488" class="usecase-label">Reject</text>

  <ellipse cx="820" cy="480" rx="75" ry="45" fill="#fce4ec" stroke="#000" stroke-width="2.5"/>
  <text x="820" y="475" class="usecase-label">Send</text>
  <text x="820" y="493" class="usecase-label">Notifications</text>

  <!-- ROW 4: Admin Management -->
  <ellipse cx="420" cy="630" rx="75" ry="45" fill="#fff9c4" stroke="#000" stroke-width="2.5"/>
  <text x="420" y="625" class="usecase-label">Manage</text>
  <text x="420" y="643" class="usecase-label">Users</text>

  <ellipse cx="620" cy="630" rx="75" ry="45" fill="#fff9c4" stroke="#000" stroke-width="2.5"/>
  <text x="620" y="625" class="usecase-label">Manage</text>
  <text x="620" y="643" class="usecase-label">Schools</text>

  <ellipse cx="820" cy="630" rx="75" ry="45" fill="#fff9c4" stroke="#000" stroke-width="2.5"/>
  <text x="820" y="625" class="usecase-label">Generate</text>
  <text x="820" y="643" class="usecase-label">Reports</text>

  <!-- ROW 5: Super Admin Functions -->
  <ellipse cx="480" cy="760" rx="75" ry="45" fill="#ffccbc" stroke="#000" stroke-width="2.5"/>
  <text x="480" y="750" class="usecase-label">System</text>
  <text x="480" y="768" class="usecase-label">Config</text>

  <ellipse cx="720" cy="760" rx="75" ry="45" fill="#ffccbc" stroke="#000" stroke-width="2.5"/>
  <text x="720" y="755" class="usecase-label">View</text>
  <text x="720" y="773" class="usecase-label">Audit Logs</text>

  <!-- ========== ASSOCIATIONS WITH ARROWS & LABELS ========== -->

  <!-- STUDENT Associations -->
  <!-- Student -> Register -->
  <line x1="155" y1="220" x2="360" y2="190" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="215" y="160" width="80" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="255" y="174" class="arrow-label" text-anchor="middle">creates account</text>

  <!-- Student -> Login -->
  <line x1="155" y1="200" x2="560" y2="190" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="310" y="142" width="80" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="350" y="156" class="arrow-label" text-anchor="middle">authenticates</text>

  <!-- Student -> Submit Application -->
  <line x1="155" y1="250" x2="360" y2="310" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="180" y="265" width="70" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="215" y="279" class="arrow-label" text-anchor="middle">submits</text>

  <!-- Student -> Upload Documents -->
  <line x1="165" y1="270" x2="560" y2="320" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="300" y="280" width="70" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="335" y="294" class="arrow-label" text-anchor="middle">uploads</text>

  <!-- Student -> Track Status -->
  <line x1="175" y1="290" x2="760" y2="310" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="420" y="265" width="80" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="460" y="279" class="arrow-label" text-anchor="middle">views status</text>

  <!-- REVIEWER Associations -->
  <!-- Reviewer -> Review Applications -->
  <line x1="155" y1="520" x2="360" y2="480" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="200" y="490" width="65" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="232" y="504" class="arrow-label" text-anchor="middle">reviews</text>

  <!-- Reviewer -> Approve/Reject -->
  <line x1="165" y1="540" x2="560" y2="485" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="320" y="520" width="60" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="350" y="534" class="arrow-label" text-anchor="middle">decides</text>

  <!-- Reviewer -> Send Notifications -->
  <line x1="175" y1="560" x2="760" y2="500" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="430" y="555" width="65" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="462" y="569" class="arrow-label" text-anchor="middle">triggers</text>

  <!-- ADMIN Associations -->
  <!-- Admin -> Manage Users -->
  <line x1="1280" y1="310" x2="500" y2="640" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="800" y="450" width="90" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="845" y="464" class="arrow-label" text-anchor="middle">administers</text>

  <!-- Admin -> Manage Schools -->
  <line x1="1280" y1="320" x2="690" y2="650" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="920" y="460" width="80" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="960" y="474" class="arrow-label" text-anchor="middle">configures</text>

  <!-- Admin -> Generate Reports -->
  <line x1="1280" y1="335" x2="880" y2="655" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="1010" y="470" width="75" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="1047" y="484" class="arrow-label" text-anchor="middle">produces</text>

  <!-- Admin -> Review Applications (additional) -->
  <line x1="1275" y1="300" x2="500" y2="460" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="800" y="370" width="70" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="835" y="384" class="arrow-label" text-anchor="middle">oversees</text>

  <!-- SUPER ADMIN Associations -->
  <!-- Super Admin -> System Configuration -->
  <line x1="1280" y1="680" x2="555" y2="795" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="880" y="720" width="110" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="935" y="734" class="arrow-label" text-anchor="middle">configures system</text>

  <!-- Super Admin -> Audit Logs -->
  <line x1="1280" y1="650" x2="795" y2="770" class="relationship-line" marker-end="url(#arrowhead)"/>
  <rect x="990" y="690" width="70" height="20" fill="#ffffff" stroke="#000" stroke-width="1" rx="3"/>
  <text x="1025" y="704" class="arrow-label" text-anchor="middle">monitors</text>

  <!-- ========== LEGEND ========== -->
  <rect x="290" y="850" width="920" height="85" fill="#fffef0" stroke="#000" stroke-width="2" rx="8"/>

  <!-- Legend: Stick Figure -->
  <circle cx="340" cy="875" r="10" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="340" y1="885" x2="340" y2="905" stroke="#000" stroke-width="2"/>
  <line x1="340" y1="893" x2="330" y2="883" stroke="#000" stroke-width="2"/>
  <line x1="340" y1="893" x2="350" y2="883" stroke="#000" stroke-width="2"/>
  <line x1="340" y1="905" x2="332" y2="920" stroke="#000" stroke-width="2"/>
  <line x1="340" y1="905" x2="348" y2="920" stroke="#000" stroke-width="2"/>
  <text x="385" y="898" font-size="13" fill="#000" font-weight="bold">Actor (External User)</text>

  <!-- Legend: Oval -->
  <ellipse cx="730" cy="875" rx="28" ry="18" fill="#e8f5e9" stroke="#000" stroke-width="2"/>
  <text x="785" y="884" font-size="13" fill="#000" font-weight="bold">Use Case (System Function)</text>

  <!-- Legend: Arrow -->
  <line x1="1100" y1="875" x2="1150" y2="875" stroke="#000" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="1170" y="884" font-size="13" fill="#000" font-weight="bold">Association (Interaction)</text>

</svg>