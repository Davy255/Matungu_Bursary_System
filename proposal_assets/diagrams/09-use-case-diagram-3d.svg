<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #1f2937; }
      .actor-label { font-size: 13px; font-weight: bold; fill: #1f2937; }
      .usecase-label { font-size: 11px; font-weight: bold; fill: white; }
      .section-label { font-size: 12px; fill: #64748b; font-style: italic; }
    </style>
  </defs>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" class="title">Use Case Diagram - Bursary Management System</text>

  <!-- System Boundary -->
  <rect x="300" y="100" width="600" height="650" fill="none" stroke="#94a3b8" stroke-width="3" rx="8"/>
  <text x="320" y="125" class="section-label">System Boundary</text>

  <!-- ACTORS (Left Side) -->
  <!-- Student -->
  <rect x="50" y="180" width="80" height="100" fill="#2563eb" stroke="#1e40af" stroke-width="2" rx="4"/>
  <text x="90" y="235" text-anchor="middle" class="actor-label" fill="white">Student</text>

  <!-- Reviewer -->
  <rect x="50" y="380" width="80" height="100" fill="#2563eb" stroke="#1e40af" stroke-width="2" rx="4"/>
  <text x="90" y="435" text-anchor="middle" class="actor-label" fill="white">Reviewer</text>

  <!-- Admin -->
  <rect x="1070" y="380" width="80" height="100" fill="#2563eb" stroke="#1e40af" stroke-width="2" rx="4"/>
  <text x="1110" y="435" text-anchor="middle" class="actor-label" fill="white">Admin</text>

  <!-- USE CASES (Center) -->
  
  <!-- Row 1: Authentication -->
  <rect x="340" y="130" width="100" height="60" fill="#14b8a6" stroke="#0d9488" stroke-width="2" rx="4"/>
  <text x="390" y="165" text-anchor="middle" class="usecase-label">Register</text>

  <rect x="520" y="130" width="100" height="60" fill="#14b8a6" stroke="#0d9488" stroke-width="2" rx="4"/>
  <text x="570" y="165" text-anchor="middle" class="usecase-label">Login</text>

  <!-- Row 2: Application Management -->
  <rect x="340" y="240" width="100" height="60" fill="#22c55e" stroke="#16a34a" stroke-width="2" rx="4"/>
  <text x="390" y="270" text-anchor="middle" class="usecase-label">Submit</text>
  <text x="390" y="285" text-anchor="middle" class="usecase-label">Application</text>

  <rect x="520" y="240" width="100" height="60" fill="#22c55e" stroke="#16a34a" stroke-width="2" rx="4"/>
  <text x="570" y="265" text-anchor="middle" class="usecase-label">Upload</text>
  <text x="570" y="280" text-anchor="middle" class="usecase-label">Documents</text>

  <rect x="700" y="240" width="100" height="60" fill="#22c55e" stroke="#16a34a" stroke-width="2" rx="4"/>
  <text x="750" y="270" text-anchor="middle" class="usecase-label">View</text>
  <text x="750" y="285" text-anchor="middle" class="usecase-label">Status</text>

  <!-- Row 3: Review/Approval -->
  <rect x="430" y="370" width="100" height="60" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2" rx="4"/>
  <text x="480" y="395" text-anchor="middle" class="usecase-label">Review</text>
  <text x="480" y="410" text-anchor="middle" class="usecase-label">Application</text>

  <rect x="610" y="370" width="100" height="60" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2" rx="4"/>
  <text x="660" y="395" text-anchor="middle" class="usecase-label">Approve</text>
  <text x="660" y="410" text-anchor="middle" class="usecase-label">Application</text>

  <!-- Row 4: Management -->
  <rect x="430" y="500" width="100" height="60" fill="#ec4899" stroke="#be185d" stroke-width="2" rx="4"/>
  <text x="480" y="525" text-anchor="middle" class="usecase-label">Manage</text>
  <text x="480" y="540" text-anchor="middle" class="usecase-label">Schools</text>

  <rect x="610" y="500" width="100" height="60" fill="#ec4899" stroke="#be185d" stroke-width="2" rx="4"/>
  <text x="660" y="530" text-anchor="middle" class="usecase-label">Generate</text>
  <text x="660" y="545" text-anchor="middle" class="usecase-label">Reports</text>

  <rect x="790" y="500" width="100" height="60" fill="#ec4899" stroke="#be185d" stroke-width="2" rx="4"/>
  <text x="840" y="530" text-anchor="middle" class="usecase-label">Manage</text>
  <text x="840" y="545" text-anchor="middle" class="usecase-label">Users</text>

  <!-- Row 5: Disbursement -->
  <rect x="520" y="630" width="100" height="60" fill="#f59e0b" stroke="#d97706" stroke-width="2" rx="4"/>
  <text x="570" y="655" text-anchor="middle" class="usecase-label">Process</text>
  <text x="570" y="670" text-anchor="middle" class="usecase-label">Disbursement</text>

  <!-- ASSOCIATIONS/CONNECTIONS -->
  <!-- Student connections -->
  <line x1="130" y1="210" x2="340" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="130" y1="230" x2="520" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="130" y1="260" x2="340" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="130" y1="270" x2="520" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="280" x2="700" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Reviewer connections -->
  <line x1="130" y1="420" x2="430" y2="400" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="130" y1="460" x2="610" y2="400" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Admin connections -->
  <line x1="1070" y1="420" x2="790" y2="530" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1070" y1="430" x2="710" y2="530" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1070" y1="440" x2="630" y2="530" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1070" y1="450" x2="570" y2="630" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="280" y="720" width="640" height="60" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="4"/>
  
  <rect x="300" y="735" width="50" height="30" fill="#2563eb" stroke="#1e40af" stroke-width="1" rx="2"/>
  <text x="365" y="755" font-size="11" fill="#1f2937">Actor (External Role)</text>

  <rect x="600" y="735" width="50" height="30" fill="#14b8a6" stroke="#0d9488" stroke-width="1" rx="2"/>
  <text x="665" y="755" font-size="11" fill="#1f2937">Use Case (System Action)</text>

  <line x1="920" y1="750" x2="970" y2="750" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="985" y="755" font-size="11" fill="#1f2937">Association</text>

</svg>