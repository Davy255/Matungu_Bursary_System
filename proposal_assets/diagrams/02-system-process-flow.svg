<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="55" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="#0f172a">System Process Flow Diagram</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect x="120" y="120" width="230" height="78" rx="12" fill="#0ea5e9" stroke="#075985" stroke-width="2"/>
  <text x="235" y="167" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#ffffff">User Registration</text>

  <rect x="420" y="120" width="230" height="78" rx="12" fill="#14b8a6" stroke="#0f766e" stroke-width="2"/>
  <text x="535" y="167" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#ffffff">Profile Setup</text>

  <rect x="720" y="120" width="250" height="78" rx="12" fill="#14b8a6" stroke="#0f766e" stroke-width="2"/>
  <text x="845" y="167" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#ffffff">Application Submission</text>

  <polygon points="1080,119 1270,119 1330,159 1270,199 1080,199 1020,159" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
