  <line x1="650" y1="159" x2="720" y2="159" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="970" y1="159" x2="1020" y2="159" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="1110" y1="199" x2="930" y2="280" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1020" y="236" font-family="Arial" font-size="16" font-weight="700" fill="#166534">YES</text>

  <line x1="1205" y1="199" x2="1175" y2="280" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1215" y="243" font-family="Arial" font-size="16" font-weight="700" fill="#991b1b">NO</text>

  <line x1="1040" y1="319" x2="535" y2="319" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="535" y1="319" x2="535" y2="198" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="870" y1="358" x2="870" y2="430" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="870" y1="508" x2="870" y2="560" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="780" y1="640" x2="620" y2="700" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="715" y="670" font-family="Arial" font-size="15" font-weight="700" fill="#991b1b">NO</text>

  <line x1="870" y1="640" x2="870" y2="700" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="885" y="675" font-family="Arial" font-size="15" font-weight="700" fill="#166534">YES</text>

  <line x1="980" y1="739" x2="1050" y2="739" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
