  <text x="1175" y="176" text-anchor="middle" font-family="Arial" font-size="14" fill="#111827">Docs + Data</text>

  <rect x="760" y="280" width="220" height="78" rx="12" fill="#22c55e" stroke="#166534" stroke-width="2"/>
  <text x="870" y="327" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#ffffff">Submit to Review</text>

  <rect x="1040" y="280" width="240" height="78" rx="12" fill="#ef4444" stroke="#991b1b" stroke-width="2"/>
  <text x="1160" y="317" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#ffffff">Return to Student</text>
  <text x="1160" y="337" text-anchor="middle" font-family="Arial" font-size="16" fill="#ffffff">for Correction</text>

  <rect x="760" y="430" width="220" height="78" rx="12" fill="#0ea5e9" stroke="#075985" stroke-width="2"/>
  <text x="870" y="477" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#ffffff">Reviewer Assessment</text>

  <polygon points="760,560 980,560 1040,600 980,640 760,640 700,600" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
  <text x="870" y="597" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#111827">Recommended?</text>
  <text x="870" y="618" text-anchor="middle" font-family="Arial" font-size="14" fill="#111827">Forward to Admin</text>

  <rect x="470" y="700" width="220" height="78" rx="12" fill="#ef4444" stroke="#991b1b" stroke-width="2"/>
  <text x="580" y="747" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#ffffff">Rejected</text>

  <rect x="760" y="700" width="220" height="78" rx="12" fill="#22c55e" stroke="#166534" stroke-width="2"/>
  <text x="870" y="747" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#ffffff">Approved</text>

  <rect x="1050" y="700" width="220" height="78" rx="12" fill="#6366f1" stroke="#312e81" stroke-width="2"/>
  <text x="1160" y="737" text-anchor="middle" font-family="Arial" font-size="17" font-weight="700" fill="#ffffff">Email Notification</text>
  <text x="1160" y="757" text-anchor="middle" font-family="Arial" font-size="15" fill="#ffffff">to Applicant</text>

