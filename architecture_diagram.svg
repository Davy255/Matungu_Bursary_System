<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#1e293b">
    Matungu Bursary System Architecture
  </text>
  
  <!-- Presentation Layer -->
  <rect x="50" y="80" width="1100" height="140" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="100" y="110" font-family="Arial" font-size="18" font-weight="bold" fill="#0c4a6e">Presentation Layer</text>
  
  <!-- Student Portal -->
  <rect x="150" y="130" width="200" height="70" rx="8" fill="#0ea5e9" stroke="#0c4a6e" stroke-width="2"/>
  <text x="250" y="170" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff">Student Portal</text>
  
  <!-- Reports Dashboard -->
  <rect x="850" y="130" width="200" height="70" rx="8" fill="#0ea5e9" stroke="#0c4a6e" stroke-width="2"/>
  <text x="950" y="165" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">Reports &amp;</text>
  <text x="950" y="185" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">Dashboard</text>
  
  <!-- Application Layer -->
  <rect x="50" y="260" width="1100" height="340" rx="10" fill="#ccfbf1" stroke="#134e4a" stroke-width="3"/>
  <text x="100" y="290" font-family="Arial" font-size="18" font-weight="bold" fill="#134e4a">Application Layer</text>
  
  <!-- Authentication -->
  <rect x="150" y="320" width="180" height="60" rx="8" fill="#14b8a6" stroke="#134e4a" stroke-width="2"/>
  <text x="240" y="355" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">Authentication</text>
  
  <!-- Profile Management -->
  <rect x="370" y="320" width="180" height="60" rx="8" fill="#14b8a6" stroke="#134e4a" stroke-width="2"/>
  <text x="460" y="345" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Profile</text>
  <text x="460" y="365" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Management</text>
  
  <!-- Bursary Application -->
  <rect x="590" y="320" width="180" height="60" rx="8" fill="#14b8a6" stroke="#134e4a" stroke-width="2"/>
  <text x="680" y="345" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Bursary</text>
  <text x="680" y="365" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Application</text>
  
  <!-- Review Module -->
  <rect x="370" y="420" width="180" height="60" rx="8" fill="#14b8a6" stroke="#134e4a" stroke-width="2"/>
  <text x="460" y="455" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">Review Module</text>
  
  <!-- Admin Approval -->
  <rect x="590" y="420" width="180" height="60" rx="8" fill="#14b8a6" stroke="#134e4a" stroke-width="2"/>
  <text x="680" y="445" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Admin</text>
  <text x="680" y="465" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Approval</text>
  
  <!-- Notification Module -->
  <rect x="590" y="520" width="180" height="60" rx="8" fill="#14b8a6" stroke="#134e4a" stroke-width="2"/>
  <text x="680" y="545" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Notification</text>
  <text x="680" y="565" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Module</text>
  
  <!-- Data and External Services Layer -->
  <rect x="50" y="640" width="1100" height="200" rx="10" fill="#fef3c7" stroke="#78350f" stroke-width="3"/>
  <text x="100" y="670" font-family="Arial" font-size="18" font-weight="bold" fill="#78350f">Data &amp; External Services</text>
  
  <!-- MySQL Database -->
  <ellipse cx="280" cy="750" rx="110" ry="55" fill="#f59e0b" stroke="#78350f" stroke-width="2"/>
  <text x="280" y="745" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#111827">MySQL</text>
  <text x="280" y="765" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#111827">Database</text>
  
  <!-- Email Service -->
  <rect x="540" y="710" width="180" height="60" rx="8" fill="#6366f1" stroke="#312e81" stroke-width="2"/>
  <text x="630" y="735" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Email Service</text>
  <text x="630" y="755" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">(SMTP)</text>
  
  <!-- Decision Disbursement -->
  <rect x="850" y="710" width="180" height="60" rx="8" fill="#22c55e" stroke="#14532d" stroke-width="2"/>
  <text x="940" y="735" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#111827">Decision &amp;</text>
  <text x="940" y="755" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#111827">Disbursement</text>
  
  <!-- Arrows -->
  <!-- Student Portal to Authentication -->
  <path d="M 250 200 L 250 320" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Authentication to Profile -->
  <path d="M 330 350 L 370 350" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Profile to Application -->
  <path d="M 550 350 L 590 350" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Application to Review -->
  <path d="M 590 380 L 520 420" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Review to Admin -->
  <path d="M 550 450 L 590 450" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Admin to Notification -->
  <path d="M 680 480 L 680 520" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Notification to Email -->
  <path d="M 650 580 L 630 710" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Admin to Disbursement -->
  <path d="M 770 450 L 900 710" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Application to Database -->
  <path d="M 590 380 L 360 695" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Review to Database -->
  <path d="M 370 480 L 310 695" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Profile to Database -->
  <path d="M 390 380 L 300 695" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Dashboard to Database -->
  <path d="M 950 200 L 350 695" stroke="#1e293b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <text x="50" y="870" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b">Legend:</text>
  <rect x="150" y="855" width="60" height="25" rx="4" fill="#0ea5e9"/>
  <text x="220" y="872" font-family="Arial" font-size="14" fill="#1e293b">User Interface</text>
  
  <rect x="350" y="855" width="60" height="25" rx="4" fill="#14b8a6"/>
  <text x="420" y="872" font-family="Arial" font-size="14" fill="#1e293b">Application Modules</text>
  
  <rect x="600" y="855" width="60" height="25" rx="4" fill="#f59e0b"/>
  <text x="670" y="872" font-family="Arial" font-size="14" fill="#1e293b">Database</text>
  
  <rect x="800" y="855" width="60" height="25" rx="4" fill="#6366f1"/>
  <text x="870" y="872" font-family="Arial" font-size="14" fill="#1e293b">External Service</text>
  
  <rect x="1020" y="855" width="60" height="25" rx="4" fill="#22c55e"/>
  <text x="1090" y="872" font-family="Arial" font-size="14" fill="#1e293b">Output</text>
</svg>
