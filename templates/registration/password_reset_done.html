{% extends 'base.html' %}

{% block title %}Reset Email Sent - Bursary System{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-body p-5 text-center">
                    <h2 class="card-title mb-3">Check Your Email</h2>
                    <p class="text-muted mb-4">
                        If an account exists with the email you entered, a password reset link has been sent.
                        Please check your inbox and spam folder.
                    </p>
                    <a href="{% url 'users:login' %}" class="btn btn-outline-primary">
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
